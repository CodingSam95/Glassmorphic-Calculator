<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glass Glow Calculator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
</head>

<body>

    <div class="calculator">

        <div class="top-bar">
            <button id="btn-history" class="history-icon-btn" aria-label="Calculation history">
                <i class="fi fi-rr-time-past"></i>
            </button>

            <div id="history-panel" class="history-panel">
                <div class="history-panel-header">
                    <span class="history-title">History</span>
                    <button id="btn-clear-history" class="clear-history-btn" aria-label="Clear history">
                        <i class="fi fi-rr-trash"></i>
                    </button>
                </div>
                <div id="history-list" class="history-list"></div>
            </div>
        </div>
        <div class="display">
            <div id="expr-out"></div>
            <div id="decimal-out">0</div>
            <div id="fraction-out"></div>
        </div>

        <div class="grid">
            <button class="btn action ac" onclick="clearAll()">AC</button>
            <button id="btn-parentheses" class="btn number" onclick="handleParentheses()">( )</button>
            <button id="btn-ce" class="btn action ce"><i class="fi fi-rr-delete"></i></button>
            <button class="btn operator" onclick="append('/')">÷</button>

            <button class="btn number" onclick="append('7')">7</button>
            <button class="btn number" onclick="append('8')">8</button>
            <button class="btn number" onclick="append('9')">9</button>
            <button class="btn operator" onclick="append('*')">×</button>

            <button class="btn number" onclick="append('4')">4</button>
            <button class="btn number" onclick="append('5')">5</button>
            <button class="btn number" onclick="append('6')">6</button>
            <button class="btn operator" onclick="append('-')">-</button>

            <button class="btn number" onclick="append('1')">1</button>
            <button class="btn number" onclick="append('2')">2</button>
            <button class="btn number" onclick="append('3')">3</button>
            <button class="btn operator" onclick="append('+')">+</button>

            <button class="btn number" onclick="append('0')">0</button>
            <button class="btn number" onclick="append('.')">.</button>
            <button class="btn action percent" onclick="append('%')">%</button>
            <button class="btn equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
